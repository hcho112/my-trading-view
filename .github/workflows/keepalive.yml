name: Keepalive

# Prevents GitHub from pausing scheduled workflows after 60 days of inactivity.
# Runs monthly to create a lightweight commit that counts as repo activity.

on:
  schedule:
    - cron: "0 0 1 * *" # 1st of every month at midnight UTC

  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create keepalive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive commit to prevent workflow pause"
          git push
